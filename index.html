
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hávamál Diario</title>

<link rel="manifest" href="manifest.json">

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap');

body{
    margin:0;
    background:#0f0d0b url('assets/bg.png') center/cover no-repeat fixed;
    color:#efe3c2;
    font-family:'Cinzel', serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.65);
}

.container{
    position:relative;
    z-index:2;
    width:90%;
    max-width:700px;
    padding:30px;
    border:2px solid #8d6b2f;
    border-radius:22px;
    background:rgba(20,15,10,0.85);
    backdrop-filter:blur(4px);
    box-shadow:0 0 30px rgba(0,0,0,0.5);
}

h1{
    text-align:center;
    font-size:2.3em;
    color:#d9b86e;
    margin-bottom:10px;
}

.rune{
    text-align:center;
    font-size:2em;
    margin-bottom:15px;
}

.stanza-number{
    text-align:center;
    color:#b89d68;
    margin-bottom:15px;
}

.stanza{
    font-size:1.35em;
    line-height:1.8;
    text-align:center;
    margin:20px 0 30px;
}

.buttons{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
}

button{
    background:#8d6b2f;
    border:none;
    color:#f8f0db;
    padding:14px 18px;
    border-radius:12px;
    cursor:pointer;
    font-family:'Cinzel', serif;
    font-size:1em;
}

button:hover{
    opacity:0.9;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#8e8368;
    font-size:0.9em;
}

.favorite{
    margin-top:20px;
    padding:12px;
    border-top:1px solid #5e4b27;
    color:#d5c39a;
    font-size:0.95em;
}

</style>
</head>
<body>

<div class="overlay"></div>

<div class="container">
    <div class="rune">ᚢ ᛚ ᚠ</div>
    <h1>Hávamál Diario</h1>

    <div class="stanza-number" id="number"></div>
    <div class="stanza" id="stanza"></div>

    <div class="buttons">
        <button onclick="randomStanza()">Otra estrofa</button>
        <button onclick="saveFavorite()">Guardar favorita</button>
        <button onclick="speak()">Escuchar</button>
    </div>

    <div class="favorite" id="favorite">
        Ninguna estrofa guardada todavía.
    </div>

    <div class="footer">
        Sabiduría de Odín • Lectura diaria
    </div>
</div>

<script>
const stanzas = [
{
num:1,
text:"Antes de entrar, mira alrededor; nunca sabes dónde puede haber enemigos sentados."
},
{
num:15,
text:"El silencioso y prudente llega a las granjas; raramente el hablador encuentra sabiduría."
},
{
num:23,
text:"El necio permanece despierto toda la noche pensando en todo; al amanecer está agotado."
},
{
num:38,
text:"Nunca te apartes de tus armas mientras estés en campo abierto."
},
{
num:77,
text:"Mueren el ganado y los parientes, y también tú morirás; pero la fama nunca muere."
},
{
num:127,
text:"Si sabes de un amigo fiel, visítalo con frecuencia; el camino se cubre de hierba si nadie pasa."
},
{
num:76,
text:"Mueren los amigos y los bienes; lo único eterno es la reputación."
},
{
num:57,
text:"El fuego necesita leña; la amistad necesita presencia."
}
];

let currentIndex = 0;

function getDailyIndex(){
    const today = new Date();
    const start = new Date(today.getFullYear(),0,0);
    const diff = today - start;
    const day = Math.floor(diff/(1000*60*60*24));
    return day % stanzas.length;
}

function show(index){
    currentIndex = index;
    document.getElementById('number').innerText = "Estrofa " + stanzas[index].num;
    document.getElementById('stanza').innerText = stanzas[index].text;
}

function randomStanza(){
    const index = Math.floor(Math.random() * stanzas.length);
    show(index);
}

function saveFavorite(){
    localStorage.setItem("favorite", JSON.stringify(stanzas[currentIndex]));
    loadFavorite();
}

function loadFavorite(){
    const fav = JSON.parse(localStorage.getItem("favorite"));
    if(fav){
        document.getElementById("favorite").innerText =
        "Favorita: [" + fav.num + "] " + fav.text;
    }
}

function speak(){
    const utterance = new SpeechSynthesisUtterance(stanzas[currentIndex].text);
    utterance.lang = "es-ES";
    speechSynthesis.speak(utterance);
}

show(getDailyIndex());
loadFavorite();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
